<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — SwachhSense</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/site.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
</head>
<body class="auth-body">

<div class="auth-brand">
  <a href="index.html">
    <span class="sb-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 7 5 10.2 5 14a7 7 0 0 0 14 0c0-3.8-3-7-7-12z"/><path d="M9 14a3 3 0 0 0 3 3"/></svg></span>
    <b style="font-family:'Rajdhani',sans-serif;font-size:22px;letter-spacing:.5px;text-transform:uppercase">Swachh<em style="font-style:normal;color:#7CD9BE">Sense</em></b>
  </a>
</div>

<main class="auth-main">
  <div class="auth-card">
    <div class="eyebrow">Operator access</div>
    <h1>Log in</h1>
    <div class="sub">Sign in to open the Bengaluru network command centre.</div>

    <div class="auth-err" id="auth-error" role="alert"></div>

    <div class="field">
      <label for="li-email">Email address</label>
      <input id="li-email" type="email" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="li-pass">Password</label>
      <input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="auth-btn" id="btn-login">Log in</button>

    <div class="auth-alt">New operator? <a href="signup.html">Create an account</a> · <a href="index.html">Back to home</a></div>
  </div>
</main>

<div class="auth-foot">SWACHHSENSE · JAIN (DEEMED-TO-BE UNIVERSITY) · ACADEMIC PROTOTYPE</div>

<script src="js/auth.js"></script>
</body>
</html>
